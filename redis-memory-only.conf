# Redis config for load testing: memory-only mode (no disk persistence)

# Network
bind 0.0.0.0
port 6379
# For local load-testing in Docker/VM use disabled protected mode.
# If you need external access safety, set a password/ACL and enable protected mode.
protected-mode no
tcp-keepalive 60
timeout 0

# Persistence OFF
save ""
appendonly no

# Keep default snapshots disabled and avoid fsync-related stalls
appendfsync no
no-appendfsync-on-rewrite yes

# Optional: disable RDB compression/checksum since RDB is disabled anyway
rdbcompression no
rdbchecksum no

# Logging
loglevel notice

# Memory behavior
# noeviction is safer for load tests to fail fast on OOM instead of hiding pressure
maxmemory-policy noeviction

# Latency tuning
hz 10
dynamic-hz yes

# Disable lazy free background threads to reduce jitter from async frees
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
